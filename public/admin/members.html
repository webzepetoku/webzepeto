<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Members</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { dark: '#0B0E14', card: '#151A23' } } } }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: #151A23; border: 1px solid #2d3748; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2d3748; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-[#0B0E14] border-r border-gray-800 p-5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <h1 class="font-bold text-xl tracking-wide">ADMIN<span class="text-red-500">Panel</span></h1>
        </div>
        <nav class="space-y-1">
            <a href="/admin/dashboard.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-chart-line w-6"></i> Statistics</a>
            <a href="/admin/members.html" class="flex items-center p-3 text-sm font-medium bg-red-900/20 text-red-400 border-l-2 border-red-500 rounded-r-lg"><i class="fas fa-users-cog w-6"></i> Members</a>
            <a href="/admin/settings.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-cogs w-6"></i> Site Settings</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-white">Manage <span class="text-red-500">Members</span></h2>
            <button class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold"><i class="fas fa-plus"></i> Add Member</button>
        </div>

        <div class="glass-card p-6">
            <table>
                <thead>
                    <tr class="text-gray-400 text-sm">
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td class="font-bold text-white">admin</td>
                        <td><span class="bg-red-900/40 text-red-400 px-2 py-1 rounded text-xs">ADMIN</span></td>
                        <td>2026-01-01</td>
                        <td>-</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td class="font-bold text-white">Member01</td>
                        <td><span class="bg-blue-900/40 text-blue-400 px-2 py-1 rounded text-xs">MEMBER</span></td>
                        <td>2026-02-15</td>
                        <td>
                            <button class="text-yellow-500 hover:text-yellow-400 mr-2"><i class="fas fa-edit"></i></button>
                            <button class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
