<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { dark: '#0B0E14', card: '#151A23', accent: '#a855f7' } } }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: #151A23; border: 1px solid #2d3748; border-radius: 12px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0B0E14] border-r border-gray-800 p-5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <h1 class="font-bold text-xl tracking-wide">ADMIN<span class="text-red-500">Panel</span></h1>
        </div>
        <nav class="space-y-1">
            <a href="/admin/dashboard.html" class="flex items-center p-3 text-sm font-medium bg-red-900/20 text-red-400 border-l-2 border-red-500 rounded-r-lg"><i class="fas fa-chart-line w-6"></i> Statistics</a>
            <a href="/admin/members.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-users-cog w-6"></i> Members</a>
            <a href="/admin/settings.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-cogs w-6"></i> Site Settings</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <h2 class="text-3xl font-bold text-white mb-8">System <span class="text-red-500">Overview</span></h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 text-center">
                <p class="text-gray-400 text-sm uppercase">Total Members</p>
                <p class="text-4xl font-bold text-white mt-2">12</p>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-gray-400 text-sm uppercase">Total Zepeto Accounts</p>
                <p class="text-4xl font-bold text-purple-400 mt-2">45</p>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-gray-400 text-sm uppercase">Files Processed</p>
                <p class="text-4xl font-bold text-green-400 mt-2">1,520</p>
            </div>
        </div>
    </main>
</body>
</html>
