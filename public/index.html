<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zepeto Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0B0E14',
                        card: '#151A23',
                        accent: '#a855f7',
                        accentHover: '#9333ea'
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Glass Effect Login Card */
        .glass-login {
            background: rgba(21, 26, 35, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Input Style */
        .input-field {
            background: rgba(11, 14, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
            outline: none;
        }

        /* Background Glow */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, rgba(11,14,20,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen relative">

    <div class="glow-bg"></div>
    <div class="absolute top-10 left-10 w-20 h-20 bg-purple-600/20 rounded-full blur-xl animate-float"></div>
    <div class="absolute bottom-20 right-20 w-32 h-32 bg-blue-600/10 rounded-full blur-2xl animate-float" style="animation-delay: 2s"></div>

    <div class="glass-login w-full max-w-md p-8 rounded-2xl relative z-10">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-purple-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/30">
                <i class="fas fa-robot text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Zepeto<span class="text-purple-500">Auto</span></h1>
            <p class="text-gray-400 text-sm mt-2">Sign in to manage your automation</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="username" class="input-field w-full py-3 pl-10 pr-4 rounded-xl" placeholder="Enter username" required>
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" id="password" class="input-field w-full py-3 pl-10 pr-4 rounded-xl" placeholder="Enter password" required>
                </div>
            </div>

            <div class="flex items-center justify-between text-xs text-gray-400">
                <label class="flex items-center cursor-pointer hover:text-white">
                    <input type="checkbox" class="mr-2 accent-purple-500 rounded"> Remember me
                </label>
                <a href="#" class="hover:text-purple-400 transition">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-500 hover:to-purple-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-purple-900/30 transition transform hover:scale-[1.02] active:scale-[0.98]">
                Sign In <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>

        <p class="text-center text-gray-500 text-xs mt-6">
            Don't have an account? <a href="#" class="text-purple-400 hover:text-white font-bold transition">Contact Admin</a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
