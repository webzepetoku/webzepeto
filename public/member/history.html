<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Zepeto Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#0B0E14', card: '#151A23', accent: '#a855f7' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: #151A23; border: 1px solid #2d3748; border-radius: 12px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        td { padding: 16px; background: #1a202c; first-child: border-top-left-radius: 8px; border-bottom-left-radius: 8px; last-child: border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        tr:hover td { background: #2d3748; transition: 0.2s; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0B0E14] border-r border-gray-800 p-5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-robot text-white"></i></div>
            <h1 class="font-bold text-xl tracking-wide">Zepeto<span class="text-purple-500">Auto</span></h1>
        </div>
        <nav class="space-y-1">

            <a href="/member/accounts.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-users w-6"></i> Zepeto Accounts</a>
            <a href="/member/upload.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-cloud-upload-alt w-6"></i> Upload Assets</a>
            <a href="/member/history.html" class="flex items-center p-3 text-sm font-medium bg-purple-900/20 text-purple-400 border-l-2 border-purple-500 rounded-r-lg"><i class="fas fa-history w-6"></i> History Log</a>
            <a href="/member/settings.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-cog w-6"></i> Settings</a>
        </nav>

                        <tr>
                            <th>Date</th>

                            <th>Filename</th>

                    </thead>
                    <tbody id="historyTable">
                        <tr>
                            <td class="text-gray-400 text-sm">2026-02-17 10:30</td>
                            <td class="flex items-center gap-2">
                                <img src="https://ui-avatars.com/api/?name=bsei&background=random" class="w-6 h-6 rounded-full">
                                <span class="text-white font-medium">bsei ejis teh</span>
                            </td>
                            <td class="text-purple-400">baju_lebaran.fbx</td>
                            <td><span class="bg-green-900/30 text-green-400 px-2 py-1 rounded text-xs font-bold">COMPLETED</span></td>
                            <td>
                                <a href="#" class="text-blue-400 hover:text-blue-300 text-xs flex items-center gap-1">
                                    <i class="fas fa-external-link-alt"></i> View Item
                                </a>

                        </tr>
                        <tr>
                            <td class="text-gray-400 text-sm">2026-02-17 10:35</td>
                            <td class="flex items-center gap-2">

                                <span class="text-white font-medium">bsei ejis teh</span>
                            </td>
                            <td class="text-purple-400">celana_jeans.fbx</td>

                            <td><span class="text-gray-600 text-xs">...</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
