<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Zepeto Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0B0E14',
                        card: '#151A23',
                        accent: '#a855f7',
                        accentHover: '#9333ea'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .sidebar-link { transition: all 0.3s; border-radius: 8px; margin-bottom: 4px; cursor: pointer; }
        .sidebar-link:hover, .active-nav { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; }
        .active-nav { border-left: 3px solid #a855f7; }
        .glass-card {
            background: #151A23;
            border: 1px solid #2d3748;
            border-radius: 12px;
        }
        
        /* Mobile Sidebar Overlay */
        #sidebarOverlay { display: none; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -100%; z-index: 50; height: 100%; transition: 0.3s; }
            #sidebar.open { left: 0; }
            #sidebarOverlay.open { display: block; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40"></div>

    <aside id="sidebar" class="w-64 bg-[#0B0E14] border-r border-gray-800 flex-shrink-0 flex flex-col justify-between p-5">
        <div>
            <div class="flex items-center justify-between mb-10 px-2">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <h1 class="font-bold text-xl tracking-wide">Zepeto<span class="text-purple-500">Auto</span></h1>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="fas fa-times text-xl"></i></button>
            </div>

            <nav>
                <a href="/member/dashboard" class="sidebar-link active-nav flex items-center p-3 text-sm font-medium">
                    <i class="fas fa-th-large w-6"></i> Dashboard
                </a>
                <a href="/member/accounts" class="sidebar-link flex items-center p-3 text-sm font-medium text-gray-400">
                    <i class="fas fa-users w-6"></i> Zepeto Accounts
                </a>
                <a href="/member/upload" class="sidebar-link flex items-center p-3 text-sm font-medium text-gray-400">
                    <i class="fas fa-cloud-upload-alt w-6"></i> Upload Assets
                </a>
                <a href="/member/history" class="sidebar-link flex items-center p-3 text-sm font-medium text-gray-400">
                    <i class="fas fa-history w-6"></i> History Log
                </a>
                <a href="/member/settings" class="sidebar-link flex items-center p-3 text-sm font-medium text-gray-400">
                    <i class="fas fa-cog w-6"></i> API Settings
                </a>
            </nav>
        </div>

        <div class="p-4 glass-card">
            <div class="flex items-center gap-3">
                <div id="userAvatar" class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-[10px] font-bold">U</div>
                <div>
                    <p id="profileName" class="text-sm font-bold text-white truncate w-24">Member</p>
                    <p class="text-xs text-green-400">● Online</p>
                </div>
            </div>
            <button onclick="logout()" class="mt-4 w-full text-xs text-red-400 hover:text-red-300 transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 text-xl"><i class="fas fa-bars"></i></button>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-100">Dashboard <span class="text-purple-500">Overview</span></h2>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 flex items-center relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-users text-6xl text-purple-500"></i>
                </div>
                <div class="w-12 h-12 rounded-lg bg-purple-900/30 flex items-center justify-center mr-4">
                    <i class="fas fa-user-friends text-purple-400 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">Linked Accounts</p>
                    <p id="countAccounts" class="text-2xl font-bold text-white mt-1">0</p>
                </div>
            </div>

            <div class="glass-card p-6 flex items-center relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-bolt text-6xl text-blue-500"></i>
                </div>
                <div class="w-12 h-12 rounded-lg bg-blue-900/30 flex items-center justify-center mr-4">
                    <i class="fas fa-check-circle text-blue-400 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">Active Sessions</p>
                    <p id="countActive" class="text-2xl font-bold text-white mt-1">0</p>
                </div>
            </div>

            <div class="glass-card p-6 flex items-center relative overflow-hidden group sm:col-span-2 lg:col-span-1">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-file-archive text-6xl text-green-500"></i>
                </div>
                <div class="w-12 h-12 rounded-lg bg-green-900/30 flex items-center justify-center mr-4">
                    <i class="fas fa-box-open text-green-400 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">Total Uploaded</p>
                    <p id="countUploads" class="text-2xl font-bold text-white mt-1">0</p>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-bold mb-5 flex items-center gap-2">
            <i class="fas fa-sparkles text-purple-400"></i> Latest Updates
        </h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 hover:border-purple-500/50 transition duration-300">
                <h4 class="font-bold text-lg text-purple-300">Auto Bypass System</h4>
                <p class="text-sm text-gray-400 mt-2 leading-relaxed">
                    Bypass polygon limit and optimize your Zepeto assets automatically.
                </p>
            </div>
            </div>
    </main>

    <script>
        const token = localStorage.getItem('zepeto_token');
        const userId = localStorage.getItem('user_id');
        const username = localStorage.getItem('username');

        if (!token) { window.location.href = '/'; }

        // Logic Sidebar Responsif
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        // Update UI Profil
        document.getElementById('profileName').innerText = username || 'Member';
        document.getElementById('userAvatar').innerText = (username || 'U').charAt(0).toUpperCase();

        async function fetchStats() {
            try {
                const headers = { 'Authorization': token };
                const accRes = await fetch(`/api/user/zepeto-accounts?member_id=${userId}`, { headers });
                const accounts = await accRes.json();
                
                if (Array.isArray(accounts)) {
                    document.getElementById('countAccounts').innerText = accounts.length;
                    document.getElementById('countActive').innerText = accounts.filter(a => a.status === 'active').length;
                }

                const histRes = await fetch(`/api/user/history?member_id=${userId}`, { headers });
                const history = await histRes.json();
                
                if (Array.isArray(history)) {
                    document.getElementById('countUploads').innerText = history.filter(h => h.status === 'completed').length;
                }
            } catch (err) { console.error("Stats Error:", err); }
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
        fetchStats();
    </script>
</body>
</html>
