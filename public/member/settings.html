<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Zepeto Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { dark: '#0B0E14', card: '#151A23', accent: '#a855f7' } }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: #151A23; border: 1px solid #2d3748; border-radius: 12px; }
        .form-input { width: 100%; background: #0B0E14; border: 1px solid #2d3748; color: white; padding: 12px; border-radius: 8px; margin-top: 5px; }
        .form-input:focus { border-color: #a855f7; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0B0E14] border-r border-gray-800 p-5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-robot text-white"></i></div>
            <h1 class="font-bold text-xl tracking-wide">Zepeto<span class="text-purple-500">Auto</span></h1>
        </div>
        <nav class="space-y-1">
            <a href="/member/dashboard.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-th-large w-6"></i> Dashboard</a>
            <a href="/member/accounts.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-users w-6"></i> Zepeto Accounts</a>
            <a href="/member/upload.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-cloud-upload-alt w-6"></i> Upload Assets</a>
            <a href="/member/history.html" class="flex items-center p-3 text-sm font-medium text-gray-400 hover:bg-gray-800 rounded-lg"><i class="fas fa-history w-6"></i> History Log</a>
            <a href="/member/settings.html" class="flex items-center p-3 text-sm font-medium bg-purple-900/20 text-purple-400 border-l-2 border-purple-500 rounded-r-lg"><i class="fas fa-cog w-6"></i> Settings</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <h2 class="text-3xl font-bold text-white mb-8">Account <span class="text-purple-500">Settings</span></h2>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-6">
                <h3 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fas fa-user-shield mr-2"></i> Profile & Security</h3>
                <div class="mb-4">
                    <label class="text-sm text-gray-400">Username</label>
                    <input type="text" value="Member01" readonly class="form-input opacity-50 cursor-not-allowed">
                </div>
                <div class="mb-4">
                    <label class="text-sm text-gray-400">New Password</label>
                    <input type="password" placeholder="Enter new password" class="form-input">
                </div>
                <button class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg mt-2">Update Profile</button>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fab fa-google-drive mr-2"></i> Google Drive API</h3>
                <p class="text-xs text-gray-400 mb-4">Required for file storage and Hugging Face processing.</p>
                
                <div class="mb-4">
                    <label class="text-sm text-gray-400">Service Account JSON (Paste Content)</label>
                    <textarea rows="5" placeholder='{ "type": "service_account", ... }' class="form-input font-mono text-xs"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-400">Input Folder ID</label>
                        <input type="text" placeholder="Folder ID for FBX" class="form-input">
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">Output Folder ID</label>
                        <input type="text" placeholder="Folder ID for Zepeto" class="form-input">
                    </div>
                </div>
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-6">Save API Config</button>
            </div>
        </div>
    </main>
</body>
</html>
